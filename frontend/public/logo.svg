<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="sv-container" x1="20" y1="0" x2="20" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="sv-mark" x1="7" y1="10" x2="33" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="sv-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- 外层柔性容器 -->
  <rect x="1" y="1" width="38" height="38" rx="11" fill="url(#sv-container)" stroke="#e2e8f0" stroke-width="0.9"/>

  <!-- 第三层：最深、最淡 -->
  <rect x="11" y="24.5" width="18" height="5.5" rx="2.8" fill="#0f172a" opacity="0.07" filter="url(#sv-soft)"/>

  <!-- 第二层：中等深度 -->
  <rect x="9" y="18.5" width="22" height="6.5" rx="3.2" fill="#0f172a" opacity="0.14"/>

  <!-- 第一层：顶部主体，cyan→slate 渐变 -->
  <rect x="7" y="10.5" width="26" height="8.5" rx="4.2" fill="url(#sv-mark)"/>

  <!-- 小高光点，增加细节呼吸感 -->
  <circle cx="12" cy="14.75" r="1.1" fill="#ffffff" opacity="0.85"/>
</svg>
