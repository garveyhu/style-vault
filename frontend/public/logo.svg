<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="svg1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="svg2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="svg3" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="svgShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#4f46e5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- 底层：深紫大方块 -->
  <rect x="5" y="14" width="22" height="22" rx="5" fill="url(#svg1)" filter="url(#svgShadow)"/>
  <!-- 中层：淡紫偏移 -->
  <rect x="11" y="9" width="22" height="22" rx="5" fill="url(#svg2)" opacity="0.95"/>
  <!-- 顶层：粉色小点缀 -->
  <rect x="26" y="4" width="10" height="10" rx="3" fill="url(#svg3)"/>
</svg>
